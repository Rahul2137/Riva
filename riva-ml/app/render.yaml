services:
  - type: web
    name: riva-assistant
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd app && uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: OPENAI_API_KEY
      - key: MONGO_URI
      - key: GOOGLE_CLIENT_ID
      - key: GOOGLE_CLIENT_SECRET
